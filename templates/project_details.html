<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ project.title }} | Project Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .project-img-header {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-top-left-radius: var(--bs-border-radius-xl) !important;
            border-top-right-radius: var(--bs-border-radius-xl) !important;
        }
    </style>
</head>
<body class="bg-light">

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-lg border-0 rounded-4">
                    <img src="{{ project.image }}" class="project-img-header" alt="{{ project.title }}">
                    
                    <div class="card-body p-5">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h1 class="fw-bold mb-0">{{ project.title }}</h1>
                            <span class="badge bg-primary fs-6">{{ project.category }}</span>
                        </div>

                        <h5 class="text-muted mb-3">Description</h5>
                        <p class="lead text-secondary">{{ project.description }}</p>

                        <hr class="my-4">

                        <div class="d-flex gap-3">
                            <a href="/" class="btn btn-outline-secondary">
                                <i class="bi bi-arrow-left"></i> Back to Home
                            </a>

                            {% if project.report %}
                            <a href="{{ project.report }}" target="_blank" class="btn btn-danger">
                                <i class="bi bi-file-earmark-pdf-fill"></i> Download Report
                            </a>
                            {% endif %}
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
