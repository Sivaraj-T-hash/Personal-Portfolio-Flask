<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        .draggable-item { cursor: move; }
        .img-thumbnail { object-fit: cover; height: 50px; width: 50px; }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">Welcome, Admin</span>
            <div>
                <a href="/" class="btn btn-outline-light me-2">View Website</a>
                <a href="/logout" class="btn btn-danger">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="card shadow mb-4">
            <div class="card-header"><h5>Manage Certificates (Drag to Reorder)</h5></div>
            <div class="card-body">
                <form action="/add_certificate" method="POST" enctype="multipart/form-data" class="d-flex gap-2 mb-4">
                    <input type="text" name="title" class="form-control" placeholder="Certificate Name" required>
                    <input type="file" name="image" class="form-control" required>
                    <button type="submit" class="btn btn-success">Add</button>
                </form>

                <table class="table align-middle">
                    <thead><tr><th>Image</th><th>Title</th><th>Action</th></tr></thead>
                    <tbody id="certificate-list">
                        {% for cert in certificates %}
                        <tr data-id="{{ cert._id }}" class="draggable-item">
                            <td><img src="{{ cert.image }}" class="img-thumbnail"></td>
                            <td>{{ cert.title }}</td>
                            <td><a href="/delete_certificate/{{ cert._id }}" class="btn btn-sm btn-danger">Delete</a></td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card shadow mb-4">
    <div class="card-header"><h5>Manage Projects (Drag to Reorder)</h5></div>
    <div class="card-body">
        <form action="/add_project" method="POST" enctype="multipart/form-data" class="d-flex flex-column gap-3 mb-4">
            
            <div class="row">
                <div class="col-md-6">
                    <input type="text" name="title" class="form-control" placeholder="Project Title" required>
                </div>
                <div class="col-md-6">
                    <input type="text" name="category" class="form-control" placeholder="Category (e.g., Web App)" required>
                </div>
            </div>

            <textarea name="description" class="form-control" rows="3" placeholder="Project Description..."></textarea>

            <div class="row">
                <div class="col-md-6">
                    <label class="form-label text-muted">Reference Image</label>
                    <input type="file" name="image" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label text-muted">Project Report (PDF/Doc)</label>
                    <input type="file" name="report" class="form-control">
                </div>
            </div>

            <button type="submit" class="btn btn-success w-100">Add Project</button>
        </form>

        <table class="table align-middle">
            </table>
    </div>
</div>
    </div>

    <script>
        function enableDragSort(listId, collectionName) {
            new Sortable(document.getElementById(listId), {
                animation: 150,
                onEnd: function (evt) {
                    var order = [];
                    document.querySelectorAll('#' + listId + ' tr').forEach(function (row) {
                        order.push(row.getAttribute('data-id'));
                    });
                    fetch('/reorder', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ collection: collectionName, order: order })
                    });
                }
            });
        }
        enableDragSort('certificate-list', 'certificates');
        enableDragSort('project-list', 'projects');
    </script>
</body>
</html>
