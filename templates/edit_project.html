<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { background: #000; color: #fff; }</style>
</head>
<body class="container py-5">
    <h2>Edit Project: {{ project.title }}</h2>
    <form action="/update_project/{{ project._id }}" method="POST" enctype="multipart/form-data">
        <div class="mb-3">
            <label>Title</label>
            <input type="text" name="title" class="form-control" value="{{ project.title }}" required>
        </div>
        <div class="mb-3">
            <label>Category</label>
            <input type="text" name="category" class="form-control" value="{{ project.category }}" required>
        </div>
        <div class="mb-3">
            <label>Description (You can use HTML here)</label>
            <textarea name="description" class="form-control" rows="10">{{ project.description }}</textarea>
        </div>
        <div class="mb-3">
            <label>Update Image (Leave blank to keep current)</label>
            <input type="file" name="image" class="form-control">
        </div>
        <div class="mb-3">
            <label>Update Report PDF (Leave blank to keep current)</label>
            <input type="file" name="report" class="form-control">
        </div>
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="/admin" class="btn btn-secondary">Cancel</a>
    </form>
</body>
</html>
